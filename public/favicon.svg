<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="100%" height="100%">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" class="stop-start" stop-color="#ffffff" />
      <stop offset="100%" class="stop-end" stop-color="#a0a0a0" />
    </linearGradient>
  </defs>
  <style>
    .code-text {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      font-weight: 900;
      fill: url(#grad);
    }
    @media (prefers-color-scheme: light) {
      .stop-start {
        stop-color: #101010;
      }
      .stop-end {
        stop-color: #606060;
      }
    }
  </style>
  <text x="50%" y="50%" font-size="90" text-anchor="middle" dominant-baseline="central" class="code-text">&lt;/&gt;</text>
</svg>
